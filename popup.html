<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Insert signature</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Compose Email Signature</h1>
  </header>

  <div class="body">
    <label class="row">
      <span>Closer</span>
      <input id="closer" type="text" placeholder="Kind regards," autocomplete="off" />
    </label>

    <label class="row">
      <span>Name</span>
      <input id="name" type="text" placeholder="Jane Doe" autocomplete="off" />
    </label>

    <label class="row">
      <span>Position</span>
      <input id="position" type="text" placeholder="Project Manager" autocomplete="off" />
    </label>

    <label class="row">
      <span>Signature image URL</span>
      <input id="imageUrl" type="url" placeholder="https://…/signature.png" autocomplete="off" />
    </label>

    <label class="row row-checkbox">
      <input id="autoInsert" type="checkbox" />
      <span>Auto-insert when a compose window opens</span>
    </label>

    <div class="preview-wrap">
      <div class="preview-label">Preview</div>
      <div class="preview" id="preview"></div>
    </div>

    <p class="status" id="status"></p>
  </div>

  <footer>
    <button id="insert" type="button">Insert into current compose</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
